version: "3.8"

services:
  web:
    build: .
    container_name: ad-agent
    ports:
      - "5000:5000"
    volumes:
      # 挂载 .env 配置文件（API Key 等）
      - ./.env:/app/.env:ro
      # 挂载数据库文件（持久化，重启不丢失）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    restart: unless-stopped
