or:#1A6DFF}.chat-send-btn{padding:10px 20px;background:#1A6DFF;color:#fff;border:none;border-radius:20px;font-size:13px;cursor:pointer}.chat-send-btn:hover{background:#1557D4}.chart-box{height:360px;width:100%}

<body>

<script>
var TOKEN = "";
var USER = null;
var trendChart = null;

function api(method, path, body) {
  var opts = {method:method, headers:{"Content-Type":"application/json"}};
  if (TOKEN) opts.headers["Authorization"] = "Bearer " + TOKEN;

function loadTrend(){
  var days = parseInt(byId("trendDays").value)||7;

    if(r.code!==200) return;
    if(!trendChart) trendChart = echarts.init(byId("trendChart"));
    var items = r.data;
    var map = {};
    items.forEach(function(item){
      var d = item.report_date;
      if(!map[d]) map[d] = {cost:0, sales:0, impressions:0};
      map[d].cost += item.cost; map[d].sales += item.sales; map[d].impressions += item.impressions;
    });
    var dates = Object.keys(map).sort();
    var costData = dates.map(function(d){return Math.round(map[d].cost*100)/100;});
    var salesData = dates.map(function(d){return Math.round(map[d].sales*100)/100;});

      tooltip:{trigger:"axis"},
      legend:{data:["\u82b1\u8d39","\u9500\u552e\u989d","\u66dd\u5149(\u4e07)"]},
      grid:{left:50,right:20,bottom:30,top:40},
      xAxis:{type:"category",data:dates,axisLabel:{rotate:30,fontSize:11}},
      yAxis:{type:"value"},
      series:[

        {name:"\u9500\u552e\u989d",type:"line",data:salesData,smooth:true,lineStyle:{color:"#10b981"},itemStyle:{color:"#10b981"}},

function formatAI(text){
  var lines = text.split(String.fromCharCode(10));
  var result = []; var inTable = false; var tableRows = [];
  for(var i=0;i<lines.length;i++){
    var l = lines[i].trim();
    if(l.indexOf('|')===0 && l.lastIndexOf('|')===l.length-1){
      var cells = l.split('|').filter(function(c){return c.trim()!=='';});
      if(cells.length>0 && cells[0].indexOf('-')>=0 && cells.join('').replace(/-/g,'').trim()==='') continue;
      if(!inTable){ inTable=true; tableRows=[]; }
      tableRows.push(cells);
    }else{
      if(inTable && tableRows.length>0){ result.push(makeTable(tableRows)); inTable=false; tableRows=[]; }
      result.push(l);
    }
  }
  if(inTable && tableRows.length>0) result.push(makeTable(tableRows));
  return result.join(String.fromCharCode(10));
  function makeTable(rows){
    var h='<table style="border-collapse:collapse;width:100%;margin:8px 0;font-size:13px">';
    for(var r=0;r<rows.length;r++){
      var tag=r===0?'th':'td';
      h+='<tr>';
      for(var c=0;c<rows[r].length;c++) h+='<'+tag+' style="border:1px solid #ddd;padding:6px 10px">'+esc(rows[r][c].trim())+'</'+tag+'>';
      h+='</tr>';
    }
    return h+'</table>';
  }
}
function sendChat(){
  var inp = byId("chatInput"); var msg = inp.value.trim(); if(!msg) return; inp.value="";
  byId("chatMessages").innerHTML += "<div class=\"msg user\">"+esc(msg)+"</div>";
  byId("chatMessages").scrollTop = byId("chatMessages").scrollHeight;
  var aiDiv = document.createElement("div"); aiDiv.className = "msg assistant"; aiDiv.id = "streamingMsg";
  byId("chatMessages").appendChild(aiDiv);
  byId("chatThinking").style.display = "flex";
  fetch("/api/chat/stream", {
    method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+TOKEN},
    body:JSON.stringify({message:msg})
  }).then(function(resp){
    var reader = resp.body.getReader(); var decoder = new TextDecoder(); var buffer = "";
    function readStream(){
      reader.read().then(function(pkt){
        if(pkt.done){ byId("chatThinking").style.display="none"; return; }
        buffer += decoder.decode(pkt.value, {stream:true});
        var lines = buffer.split("\n"); buffer = lines.pop() || "";
        for(var i=0;i<lines.length;i++){
          var line = lines[i];
          if(line.indexOf("data: ")===0){
            try{
              var data = JSON.parse(line.slice(6));
              if(data.type==="text"){
                var el = byId("streamingMsg");
                if(el) el.innerHTML += renderMarkdown(data.content);
                byId("chatMessages").scrollTop = byId("chatMessages").scrollHeight;
              }else if(data.type==="thinking"){
                var el = byId("chatThinking");
                if(el) {
                  el.style.display = "flex";
                  el.innerHTML = data.content;
                }
              }else if(data.type==="done"){
                byId("chatThinking").style.display = "none";
                var el = byId("streamingMsg");
                if(el) el.removeAttribute("id");
              }else if(data.type==="error"){
                byId("chatThinking").style.display = "none";
                if(byId("streamingMsg")) byId("streamingMsg").innerHTML += "<br><span style=\"color:var(--danger)\">"+esc(data.content)+"</span>";
              }
            }catch(e){}
          }
        }
        readStream();
      });
    }
    readStream();
  }).catch(function(){
    byId("chatThinking").style.display="none";
    byId("chatMessages").innerHTML += "<div class=\"msg assistant\" style=\"color:var(--danger)\">\u7f51\u7edc\u9519\u8bef</div>";
  });
}

// ====== Markdown 渲染器（支持表格、加粗、列表） ======
function renderMarkdown(text) {
    // 1. 先处理 <b> </b>（AI有时返回HTML标签）
    text = text.replace(/<b\s*\/?>/gi, '<strong>');
    text = text.replace(/<\/b\s*>/gi, '</strong>');
    text = text.replace(/<i\s*\/?>/gi, '<em>');
    text = text.replace(/<\/i\s*>/gi, '</em>');
    
    // 2. 处理表格（加交互样式）
    text = text.replace(/((?:\|.*?\|[\n]*)+)/g, function(match) {
        var rows = match.trim().split('\n').filter(function(r){return r.trim()!=='';});
        if (rows.length < 2) return match;
        var headerDone = false;
        var hasContent = false;
        var html = '<div class="md-table-wrap"><table class="md-table"><thead>';
        rows.forEach(function(row) {
            if (row.match(/^\|[\s:-]+\|/)) return;
            var cells = row.split('|').filter(function(c){return c.trim()!=='';});
            if (cells.length < 2) return;
            hasContent = true;
            if (!headerDone) {
                html += '<tr>';
                cells.forEach(function(c){ html += '<th>'+c.trim()+'</th>'; });
                html += '</tr></thead><tbody>';
                headerDone = true;
            } else {
                var rowClass = '';
                var rowText = cells.map(function(c){return c.trim();}).join(' ');
                if (rowText.indexOf('\u2705') >= 0) rowClass = ' row-best';
                else if (rowText.indexOf('\u274c') >= 0 || rowText.indexOf('\u2716') >= 0) rowClass = ' row-worst';
                html += '<tr class="' + rowClass + '">';
                cells.forEach(function(c){
                    var val = c.trim();
                    // 给数值加样式
                    if (val.match(/^\d+\.?\d*$/) && parseFloat(val) > 3) val = '<span class="val-good">' + val + '</span>';
                    else if (val.match(/^\d+\.?\d*$/) && parseFloat(val) < 1.5) val = '<span class="val-bad">' + val + '</span>';
                    html += '<td>' + val + '</td>';
                });
                html += '</tr>';
            }
        });
        html += '</tbody></table></div>';
        return hasContent ? html : match;
    });
    
    // 3. **加粗**
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    
    // 4. *斜体*
    text = text.replace(/\*(.+?)\*/g, '<em>$1</em>');
    
    // 5. 行内代码
    text = text.replace(/`([^`]+)`/g, '<code class="md-code">$1</code>');
    
    // 6. ✅ ❌ 图标保留
    // 7. 换行
    text = text.replace(/\n/g, '<br>');
    
    return text;
}

// 重写 formatAI 使用 markdown 渲染
var _origFormatAI = formatAI;
formatAI = function(text) {
    return renderMarkdown(text);
};</script>
